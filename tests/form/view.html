<div class="card">
  <h1>AdvanxJS Form</h1>
  <label>Name: <input ax-model="name" placeholder="Jane Doe" /></label>
  <label>Email: <input ax-model="email" placeholder="jane@example.com" /></label>
  <p>Welcome, {{ user.name }} &lt;{{ user.email }}&gt;</p>
  <button ax-on:click="reset">Reset</button>
</div>
